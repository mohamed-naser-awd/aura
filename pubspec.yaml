name: aura
description: Aura — a smart Android phone app with call grouping, smart ringing, and per-SIM control.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Local database (relational fits groups <-> members <-> rules)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Contacts (read system contacts)
  flutter_contacts: ^1.1.9+2

  # Permissions
  permission_handler: ^11.3.1

  # WhatsApp brand icon for the quick-action button
  font_awesome_flutter: ^10.7.0

  # Group avatar image + audio-file ringtone pickers
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # In-call camera: in-app preview/capture + save to the device gallery
  camera: ^0.11.0+2
  gal: ^2.3.0

  # Misc
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen for drift + riverpod
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
